<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Anime — AniStream</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Filter sidebar layout ── */
    .browse-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 0;
      min-height: calc(100vh - 64px);
    }

    /* ── Sidebar ── */
    .filter-sidebar {
      border-right: 1px solid var(--border);
      padding: 1.5rem 0;
      position: sticky;
      top: 64px;
      height: calc(100vh - 64px);
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .filter-sidebar::-webkit-scrollbar { width: 3px; }
    .filter-sidebar::-webkit-scrollbar-thumb { background: var(--border); }

    .filter-group { padding: 0 1.25rem 1.25rem; border-bottom: 1px solid var(--border); margin-bottom: 1.25rem; }
    .filter-group:last-child { border-bottom: none; margin-bottom: 0; }
    .filter-group-title {
      font-family: 'Orbitron', sans-serif;
      font-size: .6rem; letter-spacing: 2px; color: var(--muted);
      margin-bottom: .75rem; text-transform: uppercase;
    }
    .filter-tags { display: flex; flex-wrap: wrap; gap: .35rem; }

    .ftag {
      padding: .28rem .65rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: .75rem;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
      background: none;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: .3px;
      white-space: nowrap;
    }
    .ftag:hover { color: var(--text); border-color: #444; }
    .ftag.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    /* Alpha filter — # A B C ... Z */
    .alpha-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: .25rem;
    }
    .alpha-btn {
      padding: .3rem 0;
      border: 1px solid var(--border);
      border-radius: 3px;
      font-size: .7rem;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
      background: none;
      text-align: center;
      font-family: 'Orbitron', sans-serif;
    }
    .alpha-btn:hover { color: var(--text); border-color: #444; }
    .alpha-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    /* Clear filters */
    .clear-btn {
      width: 100%;
      padding: .5rem;
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      font-size: .72rem;
      cursor: pointer;
      transition: all .15s;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: .5px;
    }
    .clear-btn:hover { color: #f87171; border-color: #f87171; }

    /* ── Main content ── */
    .browse-main { padding: 1.5rem 2rem; }

    .browse-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .browse-search-wrap {
      flex: 1; max-width: 480px;
      display: flex;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }
    .browse-search-wrap input {
      flex: 1; padding: .65rem 1rem;
      background: none; border: none; outline: none;
      color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: .95rem;
    }
    .browse-search-wrap input::placeholder { color: #444; }
    .browse-search-wrap button {
      padding: .65rem 1.1rem;
      background: var(--text); color: var(--bg);
      border: none; cursor: pointer;
      font-family: 'Orbitron', sans-serif; font-size: .65rem; letter-spacing: 1px;
      transition: background .2s;
    }
    .browse-search-wrap button:hover { background: #ddd; }

    .sort-select {
      padding: .55rem .9rem;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text);
      font-family: 'Rajdhani', sans-serif; font-size: .85rem;
      cursor: pointer; outline: none;
    }
    .sort-select option { background: #111; }

    .results-meta {
      font-size: .75rem; color: var(--muted);
      white-space: nowrap;
    }

    /* Active filter chips */
    .active-filters {
      display: flex; flex-wrap: wrap; gap: .4rem;
      margin-bottom: 1rem;
    }
    .active-chip {
      display: inline-flex; align-items: center; gap: .35rem;
      padding: .2rem .6rem;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: .7rem; color: var(--text);
    }
    .active-chip button {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: .8rem; line-height: 1;
      padding: 0; transition: color .15s;
    }
    .active-chip button:hover { color: #f87171; }

    /* Suggestions dropdown */
    #suggestions {
      position: absolute; top: 100%; left: 0; right: 0;
      background: #111; border: 1px solid #222;
      border-radius: 0 0 8px 8px; z-index: 200; overflow: hidden;
    }
    .suggestion-item {
      padding: .6rem 1rem; cursor: pointer;
      display: flex; align-items: center; gap: .75rem;
      transition: background .15s;
    }
    .suggestion-item:hover { background: #1a1a1a; }
    .suggestion-item img { width: 28px; height: 40px; object-fit: cover; border-radius: 3px; flex-shrink: 0; }
    .suggestion-item span { font-size: .85rem; }

    /* Grid */
    #search-grid { min-height: 300px; }

    /* Pagination */
    #pagination {
      display: flex; gap: .4rem;
      justify-content: center; padding: 2rem 0;
      flex-wrap: wrap;
    }

    /* Empty / error state */
    .browse-empty {
      grid-column: 1/-1; text-align: center;
      padding: 4rem 2rem; color: var(--muted);
    }
    .browse-empty .empty-icon { font-size: 3rem; opacity: .3; margin-bottom: 1rem; }
    .browse-empty p { font-size: .9rem; }

    @media (max-width: 768px) {
      .browse-layout { grid-template-columns: 1fr; }
      .filter-sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">ANISTREAM</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="search.html" class="active">Browse</a>
    <a href="downloads.html">Downloads</a>
  </div>
  <form class="nav-search" action="search.html" method="get">
    <input type="text" name="q" placeholder="Search anime..." autocomplete="off">
    <button type="submit">⌕</button>
  </form>
  <div style="display:flex;align-items:center;gap:.5rem">
    <div id="nav-user" style="display:flex;gap:.4rem;align-items:center"></div>
    <button class="nav-hamburger" id="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
  </div>
</nav>
<div class="mobile-menu" id="mobile-menu">
  <a href="index.html">Home</a>
  <a href="search.html" class="active">Browse</a>
  <a href="downloads.html">Downloads</a>
</div>

<div class="browse-layout">

  <!-- ── Filter Sidebar ── -->
  <aside class="filter-sidebar">

    <div class="filter-group">
      <div class="filter-group-title">Search</div>
      <button class="clear-btn" id="clear-all-btn">✕ Clear All Filters</button>
    </div>

    <!-- A–Z filter -->
    <div class="filter-group">
      <div class="filter-group-title">A – Z</div>
      <div class="alpha-grid" id="alpha-grid">
        <!-- built by JS -->
      </div>
    </div>

    <!-- Type -->
    <div class="filter-group">
      <div class="filter-group-title">Type</div>
      <div class="filter-tags">
        <button class="ftag" data-type="type" data-val="tv">TV</button>
        <button class="ftag" data-type="type" data-val="movie">Movie</button>
        <button class="ftag" data-type="type" data-val="ova">OVA</button>
        <button class="ftag" data-type="type" data-val="ona">ONA</button>
        <button class="ftag" data-type="type" data-val="special">Special</button>
        <button class="ftag" data-type="type" data-val="music">Music</button>
      </div>
    </div>

    <!-- Status -->
    <div class="filter-group">
      <div class="filter-group-title">Status</div>
      <div class="filter-tags">
        <button class="ftag" data-type="status" data-val="airing">Airing</button>
        <button class="ftag" data-type="status" data-val="complete">Completed</button>
        <button class="ftag" data-type="status" data-val="upcoming">Upcoming</button>
      </div>
    </div>

    <!-- Rating -->
    <div class="filter-group">
      <div class="filter-group-title">Rating</div>
      <div class="filter-tags">
        <button class="ftag" data-type="rating" data-val="g">G</button>
        <button class="ftag" data-type="rating" data-val="pg">PG</button>
        <button class="ftag" data-type="rating" data-val="pg13">PG-13</button>
        <button class="ftag" data-type="rating" data-val="r17">R-17+</button>
      </div>
    </div>

    <!-- Genre -->
    <div class="filter-group">
      <div class="filter-group-title">Genre</div>
      <div class="filter-tags" id="genre-filters">
        <div class="skeleton" style="height:26px;width:55px;border-radius:4px"></div>
        <div class="skeleton" style="height:26px;width:70px;border-radius:4px"></div>
        <div class="skeleton" style="height:26px;width:60px;border-radius:4px"></div>
        <div class="skeleton" style="height:26px;width:80px;border-radius:4px"></div>
      </div>
    </div>

    <!-- Year -->
    <div class="filter-group">
      <div class="filter-group-title">Year</div>
      <div class="filter-tags" id="year-filters">
        <!-- built by JS -->
      </div>
    </div>

    <!-- Score -->
    <div class="filter-group">
      <div class="filter-group-title">Min Score</div>
      <div class="filter-tags">
        <button class="ftag" data-type="min_score" data-val="9">9+</button>
        <button class="ftag" data-type="min_score" data-val="8">8+</button>
        <button class="ftag" data-type="min_score" data-val="7">7+</button>
        <button class="ftag" data-type="min_score" data-val="6">6+</button>
      </div>
    </div>

  </aside>

  <!-- ── Main Content ── -->
  <main class="browse-main">

    <div class="browse-topbar">
      <div class="browse-search-wrap" id="search-wrap">
        <input type="text" id="search-input" placeholder="Search anime title…" autocomplete="off">
        <button id="search-btn">SEARCH</button>
      </div>
      <select class="sort-select" id="sort-select">
        <option value="score">Top Rated</option>
        <option value="popularity">Most Popular</option>
        <option value="rank">Rank</option>
        <option value="title">Title A–Z</option>
        <option value="start_date">Newest</option>
        <option value="episodes">Most Episodes</option>
      </select>
      <span class="results-meta" id="results-info"></span>
    </div>

    <!-- Active filter chips -->
    <div class="active-filters" id="active-filters"></div>

    <!-- Results grid -->
    <div class="cards-grid" id="search-grid">
      <div class="browse-empty">
        <div class="empty-icon">🔍</div>
        <p>Search for anime or use the filters to browse</p>
      </div>
    </div>

    <div id="pagination"></div>

  </main>
</div>

<footer>
  <div class="footer-logo">ANISTREAM</div>
  <p>Metadata by <a href="https://jikan.moe" target="_blank" rel="noopener" style="color:var(--text)">Jikan</a> &amp; <a href="https://anilist.co" target="_blank" rel="noopener" style="color:var(--text)">AniList</a></p>
</footer>

<div id="toast" class="toast"></div>
<script type="module" src="js/search.js"></script>
<script type="module">
import { getUser, renderNavUser, injectAuthModal } from './js/auth.js';
injectAuthModal();
getUser().then(u => renderNavUser(u));
</script>
<script>
document.getElementById('hamburger').addEventListener('click', function() {
  document.getElementById('mobile-menu').classList.toggle('open');
});
</script>
</body>
</html>
